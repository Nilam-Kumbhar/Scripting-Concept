<script>
    class student{
        constructor(name,age){
            this.name=name;
            this.age=age;
        }
        stud(){
            document.write("name: "+this.name+" ");
            document.write("age: "+this.age);
        }
    }
    name=prompt("enter name:");
    age=prompt("enter age:");
    let s=new student(name,age);
    s.stud();
</script>

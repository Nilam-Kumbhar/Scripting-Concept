<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let units = parseInt(prompt("Enter total units:"))
    let bill=0;  
    if(units>0){
        bill=units*0.5;
        document.write("bill",bill);
    }else if(units==0){
        document.write("0 unit.")
    }else{
        document.write("invalide!!")
    }
    </script>
    

</body>
</html>
